apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  namespace: ecommerce

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ecommerce-app

  template:
    metadata:
      labels:
        app: ecommerce-app

    spec:
      containers:
      - name: ecommerce-app

        image: 848504403730.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-app:v1

        imagePullPolicy: Always

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        ports:
        - containerPort: 80