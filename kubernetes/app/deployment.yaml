apiVersion: apps/v1
kind: Deployment

metadata:
  name: ecommerce-app
  namespace: ecommerce

spec:
  replicas: 1

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: ecommerce-app

  template:
    metadata:
      labels:
        app: ecommerce-app

    spec:
      containers:
      - name: ecommerce-app

        image: 848504403730.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-app:v7

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        envFrom:
        - configMapRef:
            name: ecommerce-config

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        # TEMPORARY DEBUG PROBES
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - exit 0
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - exit 0
          initialDelaySeconds: 10
          periodSeconds: 20