<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-label="AWS Terraform architecture diagram">
  <rect width="980" height="460" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">AWS Infrastructure Provisioned By Terraform</text>
  <text x="40" y="78" font-family="Arial, sans-serif" font-size="14" fill="#475569">VPC, subnets, EC2, S3, remote state, and GitHub Actions automation</text>
  <rect x="40" y="110" width="610" height="310" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="64" y="145" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">VPC: 10.0.0.0/16</text>
  <rect x="75" y="175" width="235" height="105" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="96" y="205" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#075985">Public Subnets</text>
  <text x="96" y="230" font-family="Arial, sans-serif" font-size="13" fill="#075985">10.0.1.0/24</text>
  <text x="96" y="250" font-family="Arial, sans-serif" font-size="13" fill="#075985">10.0.2.0/24</text>
  <rect x="360" y="175" width="235" height="105" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="381" y="205" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">Private Subnets</text>
  <text x="381" y="230" font-family="Arial, sans-serif" font-size="13" fill="#166534">10.0.3.0/24</text>
  <text x="381" y="250" font-family="Arial, sans-serif" font-size="13" fill="#166534">10.0.4.0/24</text>
  <rect x="100" y="315" width="190" height="55" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="124" y="348" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">2 EC2 Instances</text>
  <rect x="335" y="315" width="210" height="55" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="369" y="348" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">NAT Gateway + IGW</text>
  <rect x="700" y="125" width="240" height="76" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="730" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">App S3 Bucket</text>
  <text x="730" y="180" font-family="Arial, sans-serif" font-size="13" fill="#1e40af">1 bucket per environment</text>
  <rect x="700" y="235" width="240" height="96" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="730" y="265" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Terraform Remote State</text>
  <text x="730" y="290" font-family="Arial, sans-serif" font-size="13" fill="#475569">S3 backend bucket</text>
  <text x="730" y="312" font-family="Arial, sans-serif" font-size="13" fill="#475569">S3 lockfile enabled</text>
  <line x1="650" y1="270" x2="700" y2="285" stroke="#64748b" stroke-width="2"/>
  <line x1="650" y1="160" x2="700" y2="160" stroke="#2563eb" stroke-width="2"/>
</svg>
